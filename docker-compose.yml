services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mc:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local ${S3_ENDPOINT_URL} ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY}); do sleep 1; done;
      mc mb -p local/${S3_BUCKET_EXPORTS} || true;
      mc anonymous set download local/${S3_BUCKET_EXPORTS} || true;
      echo 'MinIO bucket ensured.';
      tail -f /dev/null
      "

  web:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
      - minio
      - mc
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

  worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
      - minio
      - mc
    volumes:
      - ./backend:/app
    command: celery -A config worker -l INFO

  beat:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: celery -A config beat -l INFO

volumes:
  pgdata:
  miniodata:
